<!DOCTYPE html>
<html lang="en">

<load src="partial/head.htm"
    description="Write anonymous messages to Aldy Prastyo (Dipras). Share your thoughts, feedback, or questions securely and privately. Your identity is guaranteed to be protected."
    keywords="Aldy Prastyo, Dipras, anonymous message, feedback, contact, write message, private message, secure communication, anonymous feedback, Telkom University"
    title="Write to Me — Aldy Prastyo" />

<body class="bg-white text-gray-800 font-sans selection:bg-sky-200 selection:text-gray-800">
    <script defer type="module" src="comment.js"></script>
    <load src="partial/navbar.htm" />

    <main class="max-w-4xl mx-auto px-6 py-24 text-center">
        <h2 class="text-4xl font-bold text-gray-900 mb-6 fade-in-up"><span class="text-sky-700">Write</span> something
            to Me</h2>
        <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-16 fade-in-up fade-in-delay-2">
            You can tell me anything you want to <span class="text-sky-700">me</span> on this page. The security of
            <span class="text-sky-700">your identity is guaranteed</span>, so there's no need to worry.
        </p>

        <form class="text-start flex flex-col max-w-md mx-auto space-y-4" method="post" id="comment-form">
            <input type="text" placeholder="Your Name (Optional)"
                class="w-full border border-gray-300 focus:border-sky-700 focus:outline-none focus:ring-2 focus:ring-sky-700/20 p-3 rounded-lg transition-all duration-300 ease-in-out hover:border-sky-500" name="name">
            <textarea placeholder="Write your message here..." rows="6"
                class="w-full border border-gray-300 focus:border-sky-700 focus:outline-none focus:ring-2 focus:ring-sky-700/20 p-3 rounded-lg transition-all duration-300 ease-in-out hover:border-sky-500 resize-vertical" required name="comment"></textarea>

            <!-- Profanity notice (minimal, English) -->
            <div class="text-sm text-gray-600 max-w-md mx-auto text-left mb-2">
                Please keep your message respectful. Profanity and offensive language are automatically filtered by my 
                <a href="https://github.com/dipras/text-purifier" target="_blank" rel="noopener" class="text-sky-700 underline">text purifier</a>.
            </div>

            <button type="submit"
                class="w-full bg-sky-700 hover:bg-sky-800 text-white font-medium py-3 px-4 rounded-lg transition-all duration-300 ease-in-out cursor-pointer" id="comment-btn">Send
                Thougt</button>
        </form>
    </main>

    <section class="max-w-4xl mx-auto px-6 py-16">
        <h3 class="text-2xl font-semibold text-gray-900 mb-8 text-center">People's Thoughts About <span
                class="text-sky-700">Me</span></h3>

        <div class="max-w-2xl mx-auto space-y-4" id="comment-section">
            <div class="flex justify-center">
                <load src="partial/spinner.htm" />
            </div>
        </div>
    </section>


    <load src="partial/footer.htm" />

    <load src="partial/scrollTop.htm" />
</body>

</html>
